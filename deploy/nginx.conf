# Nginx reverse proxy for the CineMatch API. Put at /etc/nginx/conf.d/cinematch.conf on EC2.
# certbot rewrites/adds the 443 TLS block automatically; this is the starting HTTP-only server.
server {
    listen 80;
    server_name api.adityadevhub.in;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
