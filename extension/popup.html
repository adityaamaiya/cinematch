<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CineMatch</title>
    <style>
      :root {
        --bg: #0a0a0a;
        --fg: #f5f5f5;
        --muted: #9ca3af;
        --track: #26262b;
        --skip: #f87171;
        --timepass: #fbbf24;
        --goforit: #4ade80;
        --perfection: #a855f7;
      }
      * { box-sizing: border-box; }
      body {
        width: 340px;
        margin: 0;
        padding: 18px;
        background: var(--bg);
        color: var(--fg);
        font: 14px/1.4 -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      h1 { font-size: 18px; margin: 0 0 14px; font-weight: 600; }
      .muted { color: var(--muted); }
      .center { text-align: center; }
      #gauge { display: block; margin: 4px auto 0; }
      .verdict { font-size: 26px; font-weight: 700; margin-top: -8px; }
      .rating { color: var(--muted); font-size: 13px; margin-top: 2px; }
      .taste {
        margin: 12px 0 4px;
        padding: 8px 10px;
        border-radius: 10px;
        background: #16161a;
        text-align: center;
        font-weight: 600;
      }
      .legend {
        display: flex;
        justify-content: space-between;
        gap: 6px;
        margin-top: 16px;
        font-size: 11px;
        color: var(--muted);
      }
      .legend span { display: inline-flex; align-items: center; gap: 4px; }
      .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
      form { display: flex; gap: 6px; margin-top: 6px; }
      input {
        flex: 1; padding: 8px 10px; border-radius: 8px; border: 1px solid #2a2a30;
        background: #16161a; color: var(--fg); font-size: 13px;
      }
      button {
        padding: 8px 12px; border: 0; border-radius: 8px; background: #4ade80;
        color: #06240f; font-weight: 600; cursor: pointer; transition: filter .12s ease;
      }
      button:hover { filter: brightness(1.08); }
      .moods { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
      .mood {
        background: #16161a; color: var(--fg); border: 1px solid #2a2a30;
        padding: 5px 10px; font-size: 12px; border-radius: 999px; cursor: pointer;
        transition: background .12s ease, border-color .12s ease;
      }
      .mood:hover { background: #22222b; border-color: #3a3a44; }
      #recs { display: flex; flex-direction: column; gap: 2px; margin-top: 10px; }
      .rec { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 8px 8px; margin: 0 -8px; border-top: 1px solid #1c1c22; border-radius: 8px; cursor: pointer; transition: background .12s ease; }
      .rec:hover, .rec:focus-visible { background: #1c1c22; outline: none; }
      .chip { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 999px; }
      .trailer {
        display: flex; align-items: center; justify-content: center; gap: 7px;
        margin: 14px 0 4px; padding: 9px 12px; width: 100%;
        background: #e11d2a; color: #fff; font-weight: 600; font-size: 13px;
        border-radius: 10px; text-decoration: none; transition: background .12s ease;
      }
      .trailer:hover { background: #c81824; }
      .watch-link {
        display: flex; align-items: center; justify-content: center; gap: 7px;
        margin: 12px 0 4px; padding: 9px 12px; width: 100%;
        background: #16161a; color: var(--fg); border: 1px solid #2a2a30;
        font-weight: 600; font-size: 13px; border-radius: 10px; text-decoration: none;
        transition: background .12s ease, border-color .12s ease;
      }
      .watch-link:hover { background: #22222b; border-color: #3a3a44; }
      .watch { margin-top: 14px; }
      .watch h4 {
        margin: 0 0 7px; font-size: 11px; font-weight: 600; letter-spacing: .04em;
        text-transform: uppercase; color: var(--muted);
      }
      .providers { display: flex; flex-wrap: wrap; gap: 8px; }
      .prov { display: inline-flex; align-items: center; gap: 6px; color: var(--fg);
        background: #16161a; border: 1px solid #2a2a30; border-radius: 8px; padding: 4px 9px 4px 4px;
        text-decoration: none; cursor: pointer; transition: background .12s ease, border-color .12s ease; }
      .prov:hover { background: #22222b; border-color: #3a3a44; }
      .prov img { width: 22px; height: 22px; border-radius: 5px; }
      .prov span { font-size: 12px; }
      .watch .kind { color: var(--muted); font-size: 11px; margin: 9px 0 5px; }
    </style>
  </head>
  <body>
    <h1>CineMatch</h1>
    <div id="view"><p class="muted center">Detecting…</p></div>
    <script src="popup.js"></script>
  </body>
</html>
