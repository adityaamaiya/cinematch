<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CineMatch</title>
    <style>
      /* Dark is the default. Light is applied automatically via prefers-color-scheme, and the
         toggle stamps data-theme on <html> to override either way. Verdict colours are shared. */
      :root {
        --bg: #0a0a0a;
        --fg: #f5f5f5;
        --muted: #9ca3af;
        --track: #26262b;
        --surface: #16161a;
        --surface-2: #22222b;
        --line: #2a2a30;
        --line-2: #3a3a44;
        --awards-fg: #e9d8a6;
        --skip: #f87171;
        --timepass: #fbbf24;
        --goforit: #4ade80;
        --perfection: #a855f7;
      }
      @media (prefers-color-scheme: light) {
        :root:not([data-theme]) {
          --bg: #f5f6f8; --fg: #17171a; --muted: #6b7280; --track: #e3e4e8;
          --surface: #ffffff; --surface-2: #eceef2; --line: #dcdde3; --line-2: #c7c8d0;
          --awards-fg: #6b5200;
        }
      }
      :root[data-theme='light'] {
        --bg: #f5f6f8; --fg: #17171a; --muted: #6b7280; --track: #e3e4e8;
        --surface: #ffffff; --surface-2: #eceef2; --line: #dcdde3; --line-2: #c7c8d0;
        --awards-fg: #6b5200;
      }
      :root[data-theme='dark'] {
        --bg: #0a0a0a; --fg: #f5f5f5; --muted: #9ca3af; --track: #26262b;
        --surface: #16161a; --surface-2: #22222b; --line: #2a2a30; --line-2: #3a3a44;
        --awards-fg: #e9d8a6;
      }

      * { box-sizing: border-box; }
      body {
        width: 460px;
        margin: 0;
        padding: 18px;
        background: var(--bg);
        color: var(--fg);
        font: 14px/1.4 -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
      h1 { font-size: 18px; margin: 0; font-weight: 600; }
      .icon-btn {
        background: var(--surface); border: 1px solid var(--line); color: var(--fg);
        width: 30px; height: 30px; padding: 0; border-radius: 8px; font-size: 15px; cursor: pointer;
        display: grid; place-items: center; line-height: 1;
      }
      .icon-btn:hover { background: var(--surface-2); }
      .muted { color: var(--muted); }
      .center { text-align: center; }
      /* Two-column hero: poster on the left, meter + title on the right. */
      .hero { display: flex; align-items: center; gap: 16px; }
      .hero-main { flex: 1; min-width: 0; text-align: center; }
      #gauge { display: block; margin: 0 auto; max-width: 100%; }
      .poster { display: block; width: 150px; flex: 0 0 auto; border-radius: 12px; box-shadow: 0 6px 18px rgba(0,0,0,.4); }
      .verdict { font-size: 26px; font-weight: 700; margin-top: -8px; }
      .rating { color: var(--muted); font-size: 13px; margin-top: 2px; }
      /* Highlighted director + lead actor. */
      .credits { margin: 14px 0 2px; display: grid; gap: 6px; padding: 10px 12px; background: var(--surface); border: 1px solid var(--line); border-radius: 10px; }
      .cr { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; font-size: 13px; }
      .cr-k { color: var(--muted); font-size: 11px; letter-spacing: .03em; text-transform: uppercase; }
      .cr-v { color: var(--fg); font-weight: 600; text-align: right; }
      .awards { font-size: 12.5px; margin: 10px 0 2px; padding: 8px 10px; border-radius: 10px; background: var(--surface); color: var(--awards-fg); line-height: 1.35; }
      /* Taste line has its OWN vibe palette, deliberately distinct from the verdict colours.
         strong = loud filled gradient, mild = tinted outline, mismatch = quiet slate. */
      .taste {
        margin: 12px 0 4px;
        padding: 9px 12px;
        border-radius: 10px;
        border: 1px solid transparent;
        text-align: center;
        font-weight: 700;
        letter-spacing: .01em;
      }
      .taste.strong {
        color: #fff;
        background: linear-gradient(135deg, #ec4899, #f43f5e);
        box-shadow: 0 4px 14px rgba(244, 63, 94, .35);
      }
      .taste.mild {
        color: #0ea5e9;
        background: rgba(14, 165, 233, .12);
        border-color: rgba(14, 165, 233, .4);
      }
      .taste.mismatch {
        color: #d97757;
        background: rgba(217, 119, 87, .13);
        border-color: rgba(217, 119, 87, .42);
      }
      .legend {
        display: flex;
        justify-content: space-between;
        gap: 6px;
        margin-top: 16px;
        font-size: 11px;
        color: var(--muted);
      }
      .legend span { display: inline-flex; align-items: center; gap: 4px; }
      .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
      form { display: flex; gap: 6px; margin-top: 6px; }
      input {
        flex: 1; padding: 8px 10px; border-radius: 8px; border: 1px solid var(--line);
        background: var(--surface); color: var(--fg); font-size: 13px;
      }
      button {
        padding: 8px 12px; border: 0; border-radius: 8px; background: #4ade80;
        color: #06240f; font-weight: 600; cursor: pointer; transition: filter .12s ease;
      }
      button:hover { filter: brightness(1.08); }
      .moods { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
      .mood {
        background: var(--surface); color: var(--fg); border: 1px solid var(--line);
        padding: 5px 10px; font-size: 12px; border-radius: 999px; cursor: pointer;
        transition: background .12s ease, border-color .12s ease;
      }
      .mood:hover { background: var(--surface-2); border-color: var(--line-2); }
      #recs { display: flex; flex-direction: column; gap: 2px; margin-top: 10px; }
      .rec { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 8px 8px; margin: 0 -8px; border-top: 1px solid var(--line); border-radius: 8px; cursor: pointer; transition: background .12s ease; }
      .rec:hover, .rec:focus-visible { background: var(--surface-2); outline: none; }
      .chip { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 999px; }
      .chip-upcoming { background: var(--surface-2); color: var(--muted); }
      /* Watchlist rows: poster thumb + title/director + chip. */
      .wl-thumb { width: 34px; height: 51px; border-radius: 5px; object-fit: cover; flex: 0 0 auto; }
      .wl-thumb-empty { background: var(--surface-2); }
      .wl-meta { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 1px; }
      .wl-title { font-size: 13px; }
      .wl-dir { font-size: 11px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .trailer {
        display: flex; align-items: center; justify-content: center; gap: 7px;
        margin: 14px 0 4px; padding: 9px 12px; width: 100%;
        background: #e11d2a; color: #fff; font-weight: 600; font-size: 13px;
        border-radius: 10px; text-decoration: none; transition: background .12s ease;
      }
      .trailer:hover { background: #c81824; }
      .watch-link {
        display: flex; align-items: center; justify-content: center; gap: 7px;
        margin: 12px 0 4px; padding: 9px 12px; width: 100%;
        background: var(--surface); color: var(--fg); border: 1px solid var(--line);
        font-weight: 600; font-size: 13px; border-radius: 10px; text-decoration: none;
        transition: background .12s ease, border-color .12s ease;
      }
      .watch-link:hover { background: var(--surface-2); border-color: var(--line-2); }
      .wl-add {
        display: block; width: 100%; margin: 12px 0 4px; padding: 9px 12px;
        background: var(--surface); color: var(--fg); border: 1px solid var(--line); border-radius: 10px;
        font-weight: 600; font-size: 13px; cursor: pointer; transition: background .12s ease, border-color .12s ease;
      }
      .wl-add:hover:enabled { background: var(--surface-2); border-color: var(--line-2); }
      .wl-add:disabled { color: var(--goforit); cursor: default; }
      .ghost {
        display: block; width: 100%; margin-top: 8px; padding: 8px 12px; background: transparent;
        color: var(--muted); border: 1px solid var(--line); border-radius: 8px; font-size: 12.5px; cursor: pointer;
      }
      .ghost:hover { background: var(--surface); color: var(--fg); }
      .header-actions { display: flex; align-items: center; gap: 10px; }
      .linkbtn {
        background: none; border: 0; padding: 0; color: var(--muted); font-size: 12px;
        text-decoration: underline; cursor: pointer;
      }
      .linkbtn:hover { color: var(--fg); }
      .wl-remove {
        background: transparent; color: var(--muted); border: 0; padding: 2px 6px; font-size: 13px;
        cursor: pointer; border-radius: 6px;
      }
      .wl-remove:hover { background: var(--surface-2); color: var(--skip); }
      .watch { margin-top: 14px; }
      .watch h4 {
        margin: 0 0 7px; font-size: 11px; font-weight: 600; letter-spacing: .04em;
        text-transform: uppercase; color: var(--muted);
      }
      .providers { display: flex; flex-wrap: wrap; gap: 8px; }
      .prov { display: inline-flex; align-items: center; gap: 6px; color: var(--fg);
        background: var(--surface); border: 1px solid var(--line); border-radius: 8px; padding: 4px 9px 4px 4px;
        text-decoration: none; cursor: pointer; transition: background .12s ease, border-color .12s ease; }
      .prov:hover { background: var(--surface-2); border-color: var(--line-2); }
      .prov img { width: 22px; height: 22px; border-radius: 5px; }
      .prov span { font-size: 12px; }
      .watch .kind { color: var(--muted); font-size: 11px; margin: 9px 0 5px; }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>CineMatch</h1>
      <div class="header-actions">
        <button id="not-this" class="linkbtn" hidden>Not this title?</button>
        <button id="theme-toggle" class="icon-btn" title="Toggle light / dark" aria-label="Toggle theme">🌙</button>
      </div>
    </div>
    <div id="view"><p class="muted center">Detecting…</p></div>
    <script src="popup.js"></script>
  </body>
</html>
